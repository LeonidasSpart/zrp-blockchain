name: Unzip Blockchain Devnet

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and flatten to root
        run: |
          ZIP_FILE="zrp-blockchain-devnet.zip"
          
          if [ ! -f "$ZIP_FILE" ]; then
            echo "❌ $ZIP_FILE not found"
            exit 1
          fi

          echo "📦 Unzipping $ZIP_FILE..."
          unzip -o "$ZIP_FILE" -d ./

          echo "🗑️ Removing zip file..."
          rm -f "$ZIP_FILE"

          echo "✅ Done"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Unzip blockchain devnet files to root"
          git push
