name: Force Flatten to Root

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  flatten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force flatten all files to root
        run: |
          # Find any subdirectory that isn't .git or .github
          SUBDIR=$(find . -maxdepth 1 -type d ! -path "." ! -path "./.git" ! -path "./.github" | head -n 1)

          if [ -z "$SUBDIR" ]; then
            echo "✅ Already flattened"
            exit 0
          fi

          echo "📁 Found: $SUBDIR"

          # Move everything from subdirectory to root
          cp -r "$SUBDIR"/* . 2>/dev/null || true
          cp -r "$SUBDIR"/.* . 2>/dev/null || true

          # Remove the subdirectory
          rm -rf "$SUBDIR"

          # Remove any zip files
          rm -f *.zip

          echo "✅ Done"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Force flatten: all files to root"
          git push
