name: Flatten SDK

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  flatten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find and flatten the SDK directory
        run: |
          # Find the first directory that looks like the SDK root
          # This handles both "zrp-blockchain" and "zrp-blockchain-main"
          SDK_DIR=$(find . -maxdepth 1 -type d -name "zrp-blockchain*" | head -n 1)

          if [ -z "$SDK_DIR" ]; then
            echo "❌ No SDK directory found (looking for zrp-blockchain*)"
            exit 1
          fi

          echo "📁 Found SDK directory: $SDK_DIR"

          # Move all contents (including hidden files) to root
          # The trailing slash is important for rsync
          rsync -av --remove-source-files "$SDK_DIR/" ./

          # Remove empty directories
          find "$SDK_DIR" -type d -empty -delete

          # If the directory is now empty, remove it
          rmdir "$SDK_DIR" 2>/dev/null || echo "⚠️ Directory not empty, will be handled by git"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Flatten repo: move SDK files to root"
          git push
